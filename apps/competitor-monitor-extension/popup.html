<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"></head>
<body>
<main>
  <header><strong>Competitor Monitor</strong><button data-open-login="competitor-monitor-extension">Sign In</button><button id="upgrade">Upgrade</button></header>
  <div data-state="loading" class="state-panel"><div class="spinner"></div><p>Processing...</p></div>
  <div data-state="empty" class="state-panel"><p class="empty-msg">Capture the current page to get started.</p></div>
  <div data-state="error" class="state-panel"><p class="error-msg" id="error-msg"></p><button class="btn-retry" id="btn-retry">Retry</button></div>
  <div data-state="results" class="state-panel active">
    <p id="status">Capture the current page or compare with the last snapshot.</p>
    <div class="actions"><button id="capture">Capture</button><button id="compare">Compare</button><button id="ai">AI Summary</button></div>
    <section id="result" class="panel">Only capture pages you are allowed to access.</section>
  </div>
</main>
<script src="core.js"></script>
<script src="popup.js"></script>
</body>
</html>
