<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Account — AutoPub</title>
<link rel="stylesheet" href="./styles.css">
<link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
</head>
<body>
<header class="nav">
  <a href="./index.html" class="nav-brand">
    <img src="./assets/autopub-logo-mark.svg" alt="" class="nav-logo"><span>AutoPub</span>
  </a>
  <nav class="nav-links">
    <a href="./index.html#features">Extensions</a>
    <a href="./index.html#pricing">Pricing</a>
    <a href="./index.html#saas">AutoPub SaaS</a>
    <a href="./login.html" class="nav-signin">Sign In</a>
  </nav>
</header>
<main class="section">
  <div class="container" style="max-width:440px">
    <h2 style="margin:0 0 4px">Create your account</h2>
    <p style="color:var(--text-secondary);margin:0 0 24px">Start with a free account. Upgrade anytime.</p>

    <div class="auth-card">
      <button class="btn-google" onclick="alert('Google sign-up will be available in production with Supabase Auth.')">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or sign up with email</span></div>

      <form onsubmit="handleRegister(event)" class="auth-form">
        <label for="reg-name">Full name</label>
        <input id="reg-name" type="text" placeholder="Your name" required>

        <label for="reg-email">Email address</label>
        <input id="reg-email" type="email" placeholder="you@company.com" required>

        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="At least 8 characters" minlength="8" required>

        <label for="reg-confirm">Confirm password</label>
        <input id="reg-confirm" type="password" placeholder="Re-enter your password" minlength="8" required>

        <button class="btn-primary" type="submit" style="width:100%;justify-content:center">Create Account</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="./login.html" class="nav-signin">Sign In</a></p>
    </div>

    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:16px">By creating an account you agree to our <a href="./terms.html" style="color:var(--accent)">Terms</a> and <a href="./privacy.html" style="color:var(--accent)">Privacy Policy</a>.</p>
  </div>
</main>
<footer class="footer">
  <div class="footer-bottom" style="border-top:none;margin-top:0;text-align:center">&copy; 2026 AutoPub. All rights reserved.</div>
</footer>
<script>
function handleRegister(event) {
  event.preventDefault();
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pwd = document.getElementById("reg-password").value;
  const confirm = document.getElementById("reg-confirm").value;
  if (pwd !== confirm) { alert("Passwords do not match."); return; }
  fetch("/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name, email: email, password: pwd })
  })
    .then(function(response) { return response.json().then(function(data) { return { ok: response.ok, data: data }; }); })
    .then(function(result) {
      if (!result.ok) throw new Error(result.data.error || "Registration failed.");
      if (result.data.token) localStorage.setItem("autopub_token", result.data.token);
      localStorage.setItem("autopub_user", JSON.stringify(result.data.user || {}));
      localStorage.setItem("autopub_origin", "autopub-web");
      window.dispatchEvent(new Event("autopub-session-updated"));
      if (result.data.email_confirmation_required) {
        alert("Please confirm your email, then sign in.");
        window.location.href = "./login.html";
        return;
      }
      window.location.href = "./pricing.html";
    // Push session to Visual Saver extension in real-time
    try {
      var extId = "EXTENSION_ID_PLACEHOLDER";
      chrome.runtime.sendMessage(extId, {
        type: "AUTOPUB_SESSION_SYNC",
        session: { token: result.data.token, user: result.data.user, source: "web", synced_at: new Date().toISOString() },
        appBaseUrl: location.origin
      }, function () { /* noop */ });
    } catch (_) { /* extension not installed or not connectable */ }
    })
    .catch(function(error) { alert(error.message); });
}
</script>

</script>

</body>
</html>
